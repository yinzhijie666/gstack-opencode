name: OpenCode Validation

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Check setup script syntax
        run: bash -n setup

      - name: Build browse binaries
        run: bun run build

      - name: Validate OpenCode assets
        run: bun test test/opencode-assets.test.ts
